name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  # Tag push: create gh-extension-compatible release via precompile action
  extension-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cli/gh-extension-precompile@v2
        with:
          go_version_file: go.mod
          go_build_options: "./cmd/gh-copilot-codespace"

  # Main branch push: create dev pre-release for mise
  release:
    if: github.ref == 'refs/heads/main'
    needs: [check]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o gh-copilot-codespace-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/gh-copilot-codespace

      - uses: actions/upload-artifact@v4
        with:
          name: gh-copilot-codespace-${{ matrix.goos }}-${{ matrix.goarch }}
          path: gh-copilot-codespace-${{ matrix.goos }}-${{ matrix.goarch }}

  publish:
    if: github.ref == 'refs/heads/main'
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="dev-${SHORT_SHA}"
          gh release create "${TAG}" \
            --title "dev-${SHORT_SHA}" \
            --notes "Pre-release build from commit ${GITHUB_SHA}

          ## Install

          \`\`\`sh
          # As gh extension
          gh extension install ekroon/gh-copilot-codespace

          # With mise
          mise use -g github:ekroon/gh-copilot-codespace
          \`\`\`" \
            --prerelease \
            gh-copilot-codespace-*
